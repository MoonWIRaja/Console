# Include these location blocks inside the panel HTTPS server block.

location ~* ^/auth/(login|login/checkpoint)$ {
    limit_req zone=auth_login_zone burst=8 nodelay;
    limit_conn auth_conn_zone 20;

    try_files $uri $uri/ /index.php?$query_string;
}

location ~* ^/auth/(signup|signup/verify|password|password/reset)$ {
    # Approximates low-rate endpoints while still allowing short bursts.
    limit_req zone=auth_signup_zone burst=5 nodelay;
    limit_conn auth_conn_zone 10;

    try_files $uri $uri/ /index.php?$query_string;
}
