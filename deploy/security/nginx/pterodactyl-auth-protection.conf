# Include this file from nginx http context (for example, /etc/nginx/conf.d/).
#
# 1) Keep real client IP when panel is behind Cloudflare.
#    Refresh /etc/nginx/cloudflare-realip.conf using scripts/security/update-cloudflare-realip.sh
real_ip_header CF-Connecting-IP;
real_ip_recursive on;
include /etc/nginx/cloudflare-realip.conf;

# 2) Trusted networks that should bypass aggressive auth limits.
#    Add office/VPN CIDRs below.
geo $auth_trusted_ip {
    default 0;
    127.0.0.1/32 1;
    ::1/128 1;
}

map $auth_trusted_ip $auth_limit_key {
    1 "";
    0 $binary_remote_addr;
}

# 3) Origin-side fallback rate limiting.
#    Nginx cannot express exact "6/10m" directly, so the signup/reset profile is approximated.
limit_req_zone $auth_limit_key zone=auth_login_zone:20m rate=12r/m;
limit_req_zone $auth_limit_key zone=auth_signup_zone:20m rate=1r/m;
limit_conn_zone $auth_limit_key zone=auth_conn_zone:20m;
